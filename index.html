<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>chan//viewer</title>
<meta name="description" content="Minimal 4chan catalog browser">
<meta name="theme-color" content="#0d1117">
<link rel="dns-prefetch" href="https://a.4cdn.org">
<link rel="dns-prefetch" href="https://i.4cdn.org">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── Themes ───────────────────────────────────────────────────── */
:root,[data-theme="dark"]{
  --bg:#0d1117;--surface:#161b22;--card:#1c2330;--border:#21293a;
  --accent:#ff6b35;--postno:#ff4444;--text:#cdd9e5;--muted:#768390;
  --sub:#e6edf3;--hover:#21293a;--quote:#789922;--ql:#4d94ff;
  --sw:220px;--shadow:0 8px 40px rgba(0,0,0,.6);
}
[data-theme="light"]{
  --bg:#f0ebe3;--surface:#faf8f5;--card:#ffffff;--border:#d4cfc8;
  --accent:#d4521a;--postno:#cc2222;--text:#2c2825;--muted:#888070;
  --sub:#1a1714;--hover:#ede8e0;--quote:#5a7a1a;--ql:#2255cc;
  --shadow:0 8px 40px rgba(0,0,0,.15);
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;min-height:100vh;overflow-x:hidden;transition:background .2s,color .2s;}

/* ── Sidebar ── */
#sidebar{position:fixed;top:0;left:0;width:var(--sw);height:100vh;background:var(--surface);border-right:1px solid var(--border);z-index:100;display:flex;flex-direction:column;transform:translateX(calc(-1 * var(--sw) + 4px));transition:transform .22s cubic-bezier(.4,0,.2,1),background .2s,border-color .2s;}
#sidebar:hover{transform:translateX(0);}
#stab{position:absolute;right:-22px;top:50%;transform:translateY(-50%);width:22px;height:56px;background:var(--surface);border:1px solid var(--border);border-left:none;border-radius:0 6px 6px 0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:9px;writing-mode:vertical-rl;letter-spacing:1px;font-family:'IBM Plex Mono',monospace;user-select:none;transition:background .2s,border-color .2s;}
#shdr{padding:16px 14px 10px;border-bottom:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);}
#shdr span{color:var(--accent);font-weight:500;}
#bsearch{margin:10px 10px 6px;background:var(--card);border:1px solid var(--border);border-radius:5px;padding:6px 10px;color:var(--text);font-size:12px;width:calc(100% - 20px);outline:none;font-family:'IBM Plex Mono',monospace;transition:border-color .15s;}
#bsearch:focus{border-color:var(--accent);}
#bsearch::placeholder{color:var(--muted);}
#blist{overflow-y:auto;flex:1;padding:4px 0 12px;}
#blist::-webkit-scrollbar{width:4px;}
#blist::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.bcat{padding:8px 14px 3px;font-size:9px;font-family:'IBM Plex Mono',monospace;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;}
.bitem{display:flex;align-items:center;gap:8px;padding:5px 14px;cursor:pointer;transition:background .1s;white-space:nowrap;overflow:hidden;}
.bitem:hover{background:var(--hover);}
.bitem.active{background:rgba(255,107,53,.1);}
.bcode{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent);min-width:28px;font-weight:500;}
.bname{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;}
.bitem.active .bname{color:var(--text);}

/* ── Topbar ── */
#topbar{position:fixed;top:0;left:0;right:0;height:44px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 12px 0 24px;z-index:50;transition:background .2s,border-color .2s;}
#tlogo{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:500;color:var(--accent);letter-spacing:-.5px;flex-shrink:0;}
#tlabel{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);flex-shrink:0;}
#tlabel strong{color:var(--text);}
#backbtn{display:none;background:none;border:1px solid var(--border);border-radius:5px;color:var(--muted);padding:4px 10px;cursor:pointer;font-size:11px;font-family:'IBM Plex Mono',monospace;transition:border-color .15s,color .15s;flex-shrink:0;}
#backbtn:hover{border-color:var(--accent);color:var(--accent);}
#backbtn.show{display:block;}
#tsearchw{flex:1;max-width:320px;margin-left:auto;}
#tsearch{width:100%;background:var(--card);border:1px solid var(--border);border-radius:5px;padding:5px 10px;color:var(--text);font-size:12px;font-family:'IBM Plex Mono',monospace;outline:none;transition:border-color .15s;}
#tsearch:focus{border-color:var(--accent);}
#tsearch::placeholder{color:var(--muted);}
#rbtn,#optbtn,#themebtn{background:none;border:1px solid var(--border);border-radius:5px;color:var(--muted);padding:4px 10px;cursor:pointer;font-size:11px;font-family:'IBM Plex Mono',monospace;transition:border-color .15s,color .15s;flex-shrink:0;white-space:nowrap;}
#rbtn:hover,#optbtn:hover,#themebtn:hover{border-color:var(--accent);color:var(--accent);}
#optbtn.active{border-color:var(--accent);color:var(--accent);background:rgba(255,107,53,.08);}

/* ── Options panel ── */
#optpanel{display:none;position:fixed;top:44px;right:0;width:300px;background:var(--surface);border-left:1px solid var(--border);border-bottom:1px solid var(--border);border-radius:0 0 0 8px;padding:16px;z-index:49;box-shadow:var(--shadow);transition:background .2s,border-color .2s;}
#optpanel.show{display:block;}
.opt-section{margin-bottom:14px;}
.opt-section:last-child{margin-bottom:0;}
.opt-title{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;}
.opt-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;}
.opt-row:last-child{margin-bottom:0;}
.opt-row label{font-size:11px;color:var(--text);flex:1;cursor:pointer;line-height:1.4;}
.opt-row label small{display:block;color:var(--muted);font-size:10px;margin-top:1px;}
.opt-row input[type="text"]{flex:1;background:var(--card);border:1px solid var(--border);border-radius:4px;padding:5px 8px;color:var(--text);font-size:11px;font-family:'IBM Plex Mono',monospace;outline:none;transition:border-color .15s;}
.opt-row input[type="text"]:focus{border-color:var(--accent);}
.opt-row input[type="text"]::placeholder{color:var(--muted);}
/* custom checkbox */
.opt-check{position:relative;width:14px;height:14px;flex-shrink:0;margin-top:1px;}
.opt-check input{position:absolute;opacity:0;width:0;height:0;}
.opt-check span{display:block;width:14px;height:14px;border:1px solid var(--border);border-radius:3px;background:var(--card);transition:background .15s,border-color .15s;cursor:pointer;}
.opt-check input:checked+span{background:var(--accent);border-color:var(--accent);}
.opt-check span::after{content:'';display:none;position:absolute;left:4px;top:1px;width:5px;height:8px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(40deg);}
.opt-check input:checked+span::after{display:block;}
.filter-count{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--accent);margin-top:6px;}

/* ── Main ── */
#main{padding:60px 16px 40px 24px;min-height:100vh;}
#status{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);padding:12px 0 18px;min-height:32px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.dspin{width:7px;height:7px;border-radius:50%;background:var(--accent);display:inline-block;animation:pulse 1s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.err{color:#e05555;}

/* ── Catalog ── */
#catalog{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px;}
.tcard{background:var(--card);border:1px solid var(--border);border-radius:7px;overflow:hidden;cursor:pointer;transition:border-color .15s,transform .15s;display:flex;flex-direction:column;}
.tcard:hover{border-color:rgba(255,107,53,.5);transform:translateY(-1px);}
.tcard.filtered-out{display:none;}
.tthumb{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;background:var(--surface);}
.tph{width:100%;aspect-ratio:1/1;background:var(--hover);display:flex;align-items:center;justify-content:center;color:var(--border);font-size:28px;}
.tbody{padding:8px 9px 9px;flex:1;display:flex;flex-direction:column;gap:4px;}
.tmeta{display:flex;align-items:center;justify-content:space-between;gap:4px;}
.tno{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--postno);background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.2);border-radius:3px;padding:1px 5px;letter-spacing:.02em;white-space:nowrap;flex-shrink:0;}
.tstats{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted);display:flex;gap:6px;}
.tstats .r{color:var(--accent);}
.tstats .i{color:#4d94ff;}
.tsub{font-size:11px;font-weight:500;color:var(--sub);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.tcom{font-size:11px;color:var(--muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.nsfw .tthumb{filter:blur(16px);}
.nsfw:hover .tthumb{filter:none;}

/* ── Thread ── */
#threadview{display:none;max-width:860px;}
#threadview.show{display:block;}
.post{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:12px 14px;margin-bottom:6px;display:flex;flex-direction:column;gap:8px;animation:fi .12s ease;}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.post.op{border-color:rgba(255,107,53,.2);}
[data-theme="dark"] .post.op{background:rgba(255,107,53,.028);}
[data-theme="light"] .post.op{background:rgba(212,82,26,.04);}
.post.highlighted{border-color:var(--accent)!important;background:rgba(255,107,53,.07);}
.phdr{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.pno{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--postno);background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.2);border-radius:3px;padding:1px 5px;cursor:pointer;flex-shrink:0;}
.pno:hover{background:rgba(255,68,68,.2);}
.ptime{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);}
.psub{font-size:12px;font-weight:500;color:var(--sub);}
.pfile{display:flex;gap:12px;align-items:flex-start;}
.pimg-wrap{flex:0 0 200px;display:flex;flex-direction:column;gap:4px;align-items:flex-start;}
.pimg-wrap.exp-wrap{flex:0 0 auto;max-width:100%;}
.fileinfo{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);width:100%;word-break:break-all;line-height:1.4;}
.fileinfo a{color:var(--ql);text-decoration:none;}
.fileinfo a:hover{text-decoration:underline;}
.pimg{width:200px;height:200px;border-radius:5px;border:1px solid var(--border);cursor:pointer;object-fit:cover;display:block;}
.pimg.exp{width:auto;height:auto;max-width:680px;object-fit:unset;}
.pcom{font-size:12px;color:var(--text);line-height:1.58;word-break:break-word;flex:1;min-width:0;}
.pcom .ql{color:var(--ql);cursor:pointer;}
.pcom .ql:hover{text-decoration:underline;}
.pcom .qt{color:var(--quote);}

/* ── Misc ── */
.empty{grid-column:1/-1;padding:60px 20px;text-align:center;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:12px;line-height:2;}
.empty .big{font-size:32px;margin-bottom:12px;}
#scrolltop{position:fixed;bottom:22px;right:20px;width:36px;height:36px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;font-size:16px;display:none;align-items:center;justify-content:center;transition:border-color .15s,color .15s,background .2s;z-index:90;}
#scrolltop.show{display:flex;}
#scrolltop:hover{border-color:var(--accent);color:var(--accent);}
#imgprev{position:fixed;pointer-events:none;z-index:9999;max-width:480px;max-height:480px;border:1px solid var(--border);border-radius:6px;display:none;box-shadow:var(--shadow);}

@media(max-width:700px){
  #optpanel{width:100%;}
  #catalog{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px;}
  #main{padding:56px 8px 32px 10px;}
  .pimg-wrap{flex:0 0 130px;}
  .pimg{width:130px;height:130px;}
}
</style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div id="stab">BOARDS</div>
  <div id="shdr">// <span>boards</span></div>
  <input id="bsearch" type="text" placeholder="filter boards..." autocomplete="off" spellcheck="false">
  <div id="blist"></div>
</div>

<!-- Topbar -->
<div id="topbar">
  <div id="tlogo">chan//</div>
  <div id="tlabel"><span id="boardlbl">select a board</span></div>
  <button id="backbtn">&#8592; catalog</button>
  <div id="tsearchw"><input id="tsearch" type="text" placeholder="search catalog..." autocomplete="off" spellcheck="false"></div>
  <button id="rbtn">&#8635;</button>
  <button id="optbtn">&#9965; options</button>
  <button id="themebtn">&#9788;</button>
</div>

<!-- Options panel -->
<div id="optpanel">
  <div class="opt-section">
    <div class="opt-title">Catalog Filters</div>
    <div class="opt-row">
      <label class="opt-check"><input type="checkbox" id="fltSubOn"><span></span></label>
      <label for="fltSubOn">Filter by subject<small>Hide threads whose subject matches</small></label>
    </div>
    <div class="opt-row" id="fltSubRow" style="display:none;">
      <input type="text" id="fltSubVal" placeholder="e.g. general, thread, /qa/">
    </div>
    <div class="opt-row">
      <label class="opt-check"><input type="checkbox" id="fltComOn"><span></span></label>
      <label for="fltComOn">Filter by comment<small>Hide threads whose comment matches</small></label>
    </div>
    <div class="opt-row" id="fltComRow" style="display:none;">
      <input type="text" id="fltComVal" placeholder="e.g. discord, telegram">
    </div>
    <div class="opt-row">
      <label class="opt-check"><input type="checkbox" id="fltMinReplies"><span></span></label>
      <label for="fltMinReplies">Min replies<small>Hide threads with fewer replies</small></label>
    </div>
    <div class="opt-row" id="fltMinRepliesRow" style="display:none;">
      <input type="text" id="fltMinRepliesVal" placeholder="e.g. 10" style="max-width:80px;">
    </div>
    <div id="filterCount" class="filter-count" style="display:none;"></div>
  </div>
  <div class="opt-section">
    <div class="opt-title">Display</div>
    <div class="opt-row">
      <label class="opt-check"><input type="checkbox" id="optNsfwBlur" checked><span></span></label>
      <label for="optNsfwBlur">Blur NSFW thumbnails<small>Reveal on hover</small></label>
    </div>
  </div>
</div>

<!-- Main content -->
<div id="main">
  <div id="status"><span class="dspin"></span>&nbsp;loading&hellip;</div>
  <div id="catalog"></div>
  <div id="threadview"></div>
</div>

<div id="scrolltop">&#8593;</div>
<img id="imgprev" alt="">

<script>
var API   = 'https://a.4cdn.org';
var MEDIA = 'https://i.4cdn.org';
var NSFW  = new Set(['b','s4s','r9k','pol','int','bant','soc','r','s','hc','hm','e','u','y','d','h','gif','aco','trash']);

var PROXIES = [
  function(u){ return 'https://corsproxy.io/?url='               + encodeURIComponent(u); },
  function(u){ return 'https://api.allorigins.win/raw?url='      + encodeURIComponent(u); },
  function(u){ return 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u); },
  function(u){ return 'https://thingproxy.freeboard.io/fetch/'   + u; }
];
var pIdx = 0;

async function apiFetch(url) {
  var lastErr;
  for (var ii = 0; ii < PROXIES.length; ii++) {
    var i = (ii + pIdx) % PROXIES.length;
    var pUrl = PROXIES[i](url);
    try {
      var ctrl = new AbortController();
      var tid  = setTimeout(function(){ ctrl.abort(); }, 10000);
      var res  = await fetch(pUrl, { signal: ctrl.signal });
      clearTimeout(tid);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      var txt  = await res.text();
      if (!txt || !txt.trim()) throw new Error('empty response');
      var data = JSON.parse(txt);
      if (data && typeof data.contents === 'string') data = JSON.parse(data.contents);
      if (!data) throw new Error('null after parse');
      pIdx = i;
      return data;
    } catch(e) {
      console.warn('[proxy' + i + ']', e.message);
      lastErr = e;
    }
  }
  throw lastErr || new Error('all proxies failed');
}

function prefetch(url) {
  setTimeout(function(){ fetch(PROXIES[pIdx](url)).catch(function(){}); }, 300);
}

// ── State ─────────────────────────────────
var curBoard = null, curThread = 0, allBoards = [], allThreads = [], imgObs = null;

// ── DOM refs ──────────────────────────────
var $bl    = document.getElementById('blist');
var $bs    = document.getElementById('bsearch');
var $st    = document.getElementById('status');
var $cat   = document.getElementById('catalog');
var $tv    = document.getElementById('threadview');
var $lbl   = document.getElementById('boardlbl');
var $ts    = document.getElementById('tsearch');
var $rb    = document.getElementById('rbtn');
var $back  = document.getElementById('backbtn');
var $stop  = document.getElementById('scrolltop');
var $prev  = document.getElementById('imgprev');
var $opt   = document.getElementById('optpanel');
var $optb  = document.getElementById('optbtn');
var $theme = document.getElementById('themebtn');

// ── Theme ─────────────────────────────────
var theme = ls('theme') || 'dark';
applyTheme(theme);

function applyTheme(t) {
  theme = t;
  document.documentElement.setAttribute('data-theme', t);
  $theme.textContent = t === 'dark' ? '☀' : '☾';
  lsSave('theme', t);
}

$theme.addEventListener('click', function(){
  applyTheme(theme === 'dark' ? 'light' : 'dark');
});

// ── Options panel ─────────────────────────
$optb.addEventListener('click', function(){
  var open = $opt.classList.toggle('show');
  $optb.classList.toggle('active', open);
});

// Close panel when clicking outside
document.addEventListener('click', function(e){
  if ($opt.classList.contains('show') && !$opt.contains(e.target) && e.target !== $optb) {
    $opt.classList.remove('show');
    $optb.classList.remove('active');
  }
});

// Filter controls
var $fltSubOn         = document.getElementById('fltSubOn');
var $fltSubRow        = document.getElementById('fltSubRow');
var $fltSubVal        = document.getElementById('fltSubVal');
var $fltComOn         = document.getElementById('fltComOn');
var $fltComRow        = document.getElementById('fltComRow');
var $fltComVal        = document.getElementById('fltComVal');
var $fltMinReplies    = document.getElementById('fltMinReplies');
var $fltMinRepliesRow = document.getElementById('fltMinRepliesRow');
var $fltMinRepliesVal = document.getElementById('fltMinRepliesVal');
var $filterCount      = document.getElementById('filterCount');
var $optNsfwBlur      = document.getElementById('optNsfwBlur');

// Restore filter state from localStorage
function restoreOpts() {
  $fltSubOn.checked      = ls('fltSubOn')      === '1';
  $fltSubVal.value       = ls('fltSubVal')      || '';
  $fltComOn.checked      = ls('fltComOn')       === '1';
  $fltComVal.value       = ls('fltComVal')      || '';
  $fltMinReplies.checked = ls('fltMinReplies')  === '1';
  $fltMinRepliesVal.value= ls('fltMinRepliesVal')|| '';
  $optNsfwBlur.checked   = ls('optNsfwBlur') !== '0';
  $fltSubRow.style.display        = $fltSubOn.checked      ? '' : 'none';
  $fltComRow.style.display        = $fltComOn.checked      ? '' : 'none';
  $fltMinRepliesRow.style.display = $fltMinReplies.checked ? '' : 'none';
}
restoreOpts();

function saveAndApplyFilters() {
  lsSave('fltSubOn',      $fltSubOn.checked      ? '1' : '0');
  lsSave('fltSubVal',     $fltSubVal.value);
  lsSave('fltComOn',      $fltComOn.checked      ? '1' : '0');
  lsSave('fltComVal',     $fltComVal.value);
  lsSave('fltMinReplies', $fltMinReplies.checked ? '1' : '0');
  lsSave('fltMinRepliesVal', $fltMinRepliesVal.value);
  lsSave('optNsfwBlur',   $optNsfwBlur.checked   ? '1' : '0');
  applyFiltersToDOM();
}

$fltSubOn.addEventListener('change', function(){
  $fltSubRow.style.display = $fltSubOn.checked ? '' : 'none';
  saveAndApplyFilters();
});
$fltComOn.addEventListener('change', function(){
  $fltComRow.style.display = $fltComOn.checked ? '' : 'none';
  saveAndApplyFilters();
});
$fltMinReplies.addEventListener('change', function(){
  $fltMinRepliesRow.style.display = $fltMinReplies.checked ? '' : 'none';
  saveAndApplyFilters();
});
$fltSubVal.addEventListener('input',         saveAndApplyFilters);
$fltComVal.addEventListener('input',         saveAndApplyFilters);
$fltMinRepliesVal.addEventListener('input',  saveAndApplyFilters);
$optNsfwBlur.addEventListener('change',      saveAndApplyFilters);

function getFilterTerms(val) {
  // comma-separated list of lowercase trimmed terms
  return val.split(',').map(function(s){ return s.trim().toLowerCase(); }).filter(Boolean);
}

function threadPassesFilters(t) {
  if ($fltSubOn.checked && $fltSubVal.value.trim()) {
    var terms = getFilterTerms($fltSubVal.value);
    var sub   = (t.sub || '').toLowerCase();
    if (terms.some(function(w){ return sub.includes(w); })) return false;
  }
  if ($fltComOn.checked && $fltComVal.value.trim()) {
    var terms = getFilterTerms($fltComVal.value);
    var com   = strip(t.com || '').toLowerCase();
    if (terms.some(function(w){ return com.includes(w); })) return false;
  }
  if ($fltMinReplies.checked && $fltMinRepliesVal.value.trim()) {
    var min = parseInt($fltMinRepliesVal.value, 10);
    if (!isNaN(min) && (t.replies || 0) < min) return false;
  }
  return true;
}

function applyFiltersToDOM() {
  var cards  = $cat.querySelectorAll('.tcard');
  var hidden = 0;
  cards.forEach(function(c){
    var no = parseInt(c.dataset.no, 10);
    var t  = allThreads.find(function(x){ return x.no === no; });
    var hide = t ? !threadPassesFilters(t) : false;
    c.classList.toggle('filtered-out', hide);
    if (hide) hidden++;
  });
  // NSFW blur toggle
  var nsfwCards = $cat.querySelectorAll('.tcard.nsfw');
  nsfwCards.forEach(function(c){
    var thumb = c.querySelector('.tthumb');
    if (!thumb) return;
    if (!$optNsfwBlur.checked) {
      thumb.style.filter = 'none';
    } else {
      thumb.style.filter = '';
    }
  });
  // show count
  if (hidden > 0) {
    $filterCount.style.display = '';
    $filterCount.textContent   = hidden + ' thread' + (hidden === 1 ? '' : 's') + ' hidden by filters';
  } else {
    $filterCount.style.display = 'none';
  }
}

// ── Boards ────────────────────────────────
async function loadBoards() {
  setSt('<span class="dspin"></span>&nbsp;connecting&hellip;');
  try {
    var d = await apiFetch(API + '/boards.json');
    if (!d || !Array.isArray(d.boards)) throw new Error('bad response shape');
    allBoards = d.boards;
    renderBoards(allBoards);
    setSt(allBoards.length + ' boards');
    setTimeout(function(){ if (!curBoard) setSt(''); }, 2000);
    var last = ls('lastBoard');
    if (last) {
      var found = allBoards.find(function(b){ return b.board === last; });
      if (found) selectBoard(found.board, found.title);
    }
  } catch(e) {
    setSt('<span class="err">&#9888; ' + esc(e.message) + '</span>');
  }
}

function renderBoards(list) {
  $bl.innerHTML = '';
  var cats = { sfw:[], nsfw:[] };
  list.forEach(function(b){ (b.ws_board ? cats.sfw : cats.nsfw).push(b); });
  ['sfw','nsfw'].forEach(function(c){
    if (!cats[c].length) return;
    var hdr = mk('div','bcat');
    hdr.textContent = c === 'sfw' ? 'SFW Boards' : 'NSFW Boards';
    $bl.appendChild(hdr);
    cats[c].forEach(function(b){
      var item = mk('div','bitem' + (curBoard === b.board ? ' active' : ''));
      item.dataset.b = b.board;
      item.innerHTML = '<span class="bcode">/' + b.board + '/</span><span class="bname">' + esc(b.title) + '</span>';
      item.addEventListener('click', function(){ selectBoard(b.board, b.title); });
      item.addEventListener('mouseenter', function(){ prefetch(API + '/' + b.board + '/catalog.json'); });
      $bl.appendChild(item);
    });
  });
}

$bs.addEventListener('input', function(){
  var q = $bs.value.toLowerCase();
  renderBoards(allBoards.filter(function(b){
    return b.board.toLowerCase().includes(q) || b.title.toLowerCase().includes(q);
  }));
});

function selectBoard(b, title) {
  curBoard = b;
  $lbl.innerHTML = '<strong>/' + b + '/</strong>&nbsp;&mdash;&nbsp;' + esc(title);
  $ts.value = '';
  document.querySelectorAll('.bitem').forEach(function(e){ e.classList.toggle('active', e.dataset.b === b); });
  lsSave('lastBoard', b);
  showCatalog();
  loadCatalog(b);
}

// ── Catalog ───────────────────────────────
async function loadCatalog(b) {
  setSt('<span class="dspin"></span>&nbsp;loading /' + b + '/&hellip;');
  $cat.innerHTML = '';
  try {
    var pages = await apiFetch(API + '/' + b + '/catalog.json');
    if (!Array.isArray(pages)) throw new Error('catalog not an array');
    allThreads = pages.flatMap(function(p){ return Array.isArray(p.threads) ? p.threads : []; });
    renderCatalog(allThreads);
    setSt(allThreads.length + ' threads &mdash; /' + b + '/');
  } catch(e) {
    setSt('<span class="err">&#9888; ' + esc(e.message) + '</span>');
    $cat.innerHTML = '<div class="empty"><div class="big">&#9888;</div>' + esc(e.message) + '</div>';
  }
}

function renderCatalog(list) {
  $cat.innerHTML = '';
  if (!list.length) { $cat.innerHTML = '<div class="empty"><div class="big">&#8709;</div>no threads</div>'; return; }
  var nsfw = NSFW.has(curBoard);
  var frag = document.createDocumentFragment();
  list.forEach(function(t){
    var c   = mk('div', 'tcard' + (nsfw ? ' nsfw' : ''));
    c.dataset.no = t.no;  // needed for filter DOM matching
    var sub = t.sub ? strip(t.sub) : '';
    var com = t.com ? strip(t.com) : '';
    var imgH = '<div class="tph">&#9641;</div>';
    if (t.tim && t.ext) imgH = '<img class="tthumb" data-src="' + MEDIA + '/' + curBoard + '/' + t.tim + 's.jpg" alt="">';
    c.innerHTML = imgH
      + '<div class="tbody">'
      + '<div class="tmeta"><span class="tno">#' + t.no + '</span>'
      + '<span class="tstats"><span class="r">R' + (t.replies||0) + '</span>'
      + '<span class="i">I' + (t.images||0) + '</span></span></div>'
      + (sub ? '<div class="tsub">' + sub + '</div>' : '')
      + (com ? '<div class="tcom">' + com + '</div>' : '')
      + '</div>';
    c.addEventListener('click', function(){ loadThread(t.no); });
    c.addEventListener('mouseenter', function(){ prefetch(API + '/' + curBoard + '/thread/' + t.no + '.json'); });
    frag.appendChild(c);
  });
  $cat.appendChild(frag);
  initObs();
  applyFiltersToDOM();
}

// Catalog text search (topbar)
$ts.addEventListener('input', function(){
  var q = $ts.value.toLowerCase();
  var cards = $cat.querySelectorAll('.tcard');
  var shown = 0;
  cards.forEach(function(c){
    var no = parseInt(c.dataset.no, 10);
    var t  = allThreads.find(function(x){ return x.no === no; });
    if (!t) return;
    var matchSearch = !q || (t.sub && t.sub.toLowerCase().includes(q)) || (t.com && t.com.toLowerCase().includes(q));
    var passFilter  = threadPassesFilters(t);
    var hide = !matchSearch || !passFilter;
    c.classList.toggle('filtered-out', hide);
    if (!hide) shown++;
  });
  var total = allThreads.filter(threadPassesFilters).length;
  setSt(q ? (shown + ' / ' + allThreads.length + ' threads') : (total + ' threads &mdash; /' + curBoard + '/'));
});

$rb.addEventListener('click', function(){
  if (curThread) loadThread(curThread);
  else if (curBoard) loadCatalog(curBoard);
});

// ── Thread ────────────────────────────────
async function loadThread(no) {
  curThread = no;
  setSt('<span class="dspin"></span>&nbsp;loading thread #' + no + '&hellip;');
  showThread();
  $tv.innerHTML = '';
  try {
    var d = await apiFetch(API + '/' + curBoard + '/thread/' + no + '.json');
    if (!d || !Array.isArray(d.posts)) throw new Error('thread malformed');
    renderThread(d.posts);
    setSt(d.posts.length + ' posts &mdash; #' + no);
  } catch(e) {
    setSt('<span class="err">&#9888; ' + esc(e.message) + '</span>');
    $tv.innerHTML = '<div class="empty"><div class="big">&#9888;</div>' + esc(e.message) + '</div>';
  }
}

function renderThread(posts) {
  var op = posts[0];
  if (op && op.sub) $lbl.innerHTML = '<strong>/' + curBoard + '/</strong>&nbsp;&mdash;&nbsp;' + esc(strip(op.sub)).slice(0,60);
  var frag = document.createDocumentFragment();
  posts.forEach(function(p, i){
    var div = mk('div', 'post' + (i === 0 ? ' op' : ' reply'));
    div.id  = 'p' + p.no;
    var dt  = new Date(p.time * 1000).toLocaleString('en-GB', {
      day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit'
    });
    var fileHTML = '';
    if (p.tim && p.ext) {
      var thumb = MEDIA + '/' + curBoard + '/' + p.tim + 's.jpg';
      var full  = MEDIA + '/' + curBoard + '/' + p.tim + p.ext;
      var sz    = p.fsize ? fmtSize(p.fsize) : '';
      var dims  = (p.w && p.h) ? p.w + 'x' + p.h : '';
      var meta  = sz ? ' (' + sz + (dims ? ', ' + dims : '') + ')' : '';
      fileHTML  = '<div class="pimg-wrap">'
                + '<div class="fileinfo"><a href="' + full + '" target="_blank" rel="noopener">'
                + esc(p.filename || 'file') + p.ext + '</a>' + meta + '</div>'
                + '<img class="pimg" data-src="' + thumb + '" data-full="' + full + '" alt="">'
                + '</div>';
    }
    var com = p.com ? fmtCom(p.com) : '';
    div.innerHTML =
        '<div class="phdr">'
      + '<span class="pno" data-id="' + p.no + '">#' + p.no + '</span>'
      + '<span class="ptime">' + dt + '</span>'
      + (p.sub ? '<span class="psub">' + esc(strip(p.sub)) + '</span>' : '')
      + '</div>'
      + (fileHTML || com
          ? '<div class="pfile">' + fileHTML + (com ? '<div class="pcom">' + com + '</div>' : '') + '</div>'
          : '');
    frag.appendChild(div);
  });
  $tv.innerHTML = '';
  $tv.appendChild(frag);

  $tv.querySelectorAll('.pno').forEach(function(el){
    el.addEventListener('click', function(){ hilite(el.dataset.id); });
  });
  $tv.querySelectorAll('.ql').forEach(function(a){
    var m = a.textContent.match(/>>([\d]+)/);
    if (m) a.addEventListener('click', function(){ hilite(m[1]); });
  });
  $tv.querySelectorAll('.pimg').forEach(function(img){
    img.addEventListener('click',      function(){  togImg(img); });
    img.addEventListener('mouseenter', function(){
      if (!img.classList.contains('exp') && img.dataset.full) {
        $prev.src = img.dataset.full;
        $prev.style.display = 'block';
      }
    });
    img.addEventListener('mousemove', function(e){
      $prev.style.left = (e.pageX + 18) + 'px';
      $prev.style.top  = Math.min(e.pageY + 18, window.innerHeight - 220) + 'px';
    });
    img.addEventListener('mouseleave', function(){ $prev.style.display = 'none'; });
  });

  initObs();
  window.scrollTo({ top:0, behavior:'smooth' });
}

function hilite(id) {
  document.querySelectorAll('.post.highlighted').forEach(function(p){ p.classList.remove('highlighted'); });
  var t = document.getElementById('p' + id);
  if (t) {
    t.classList.add('highlighted');
    t.scrollIntoView({ behavior:'smooth', block:'center' });
    setTimeout(function(){ t.classList.remove('highlighted'); }, 2000);
  }
}

function togImg(img) {
  var expand = !img.classList.contains('exp');
  img.classList.toggle('exp', expand);
  var wrap = img.closest('.pimg-wrap');
  if (wrap) wrap.classList.toggle('exp-wrap', expand);
  $prev.style.display = 'none';
  if (expand && img.dataset.full) {
    img.src = img.dataset.full;
  } else {
    var src = img.getAttribute('data-src') || (img.dataset.full || '').replace(/\.[^.]+$/, 's.jpg');
    if (src) img.src = src;
  }
}

// ── View switching ────────────────────────
function showCatalog() {
  curThread = 0;
  $cat.style.display = 'grid';
  $tv.classList.remove('show');
  $back.classList.remove('show');
  $ts.placeholder = 'search catalog...';
}
function showThread() {
  $cat.style.display = 'none';
  $tv.classList.add('show');
  $back.classList.add('show');
  $ts.value = '';
  $ts.placeholder = '';
}
$back.addEventListener('click', function(){ showCatalog(); if (curBoard) loadCatalog(curBoard); });

// ── Lazy images ───────────────────────────
function initObs() {
  if (imgObs) imgObs.disconnect();
  imgObs = new IntersectionObserver(function(entries){
    entries.forEach(function(en){
      if (en.isIntersecting) {
        var img = en.target, src = img.getAttribute('data-src');
        if (src) { img.src = src; img.removeAttribute('data-src'); }
        imgObs.unobserve(img);
      }
    });
  }, { rootMargin:'120px' });
  document.querySelectorAll('img[data-src]').forEach(function(i){ imgObs.observe(i); });
}

// ── Scroll to top ─────────────────────────
window.addEventListener('scroll', function(){ $stop.classList.toggle('show', window.pageYOffset > 400); });
$stop.addEventListener('click',  function(){ window.scrollTo({ top:0, behavior:'smooth' }); });

// ── Helpers ───────────────────────────────
function fmtCom(s) {
  return s
    .replace(/<a[^>]*class="quotelink"[^>]*>(.*?)<\/a>/g, '<span class="ql">$1</span>')
    .replace(/class="quote"/g, 'class="qt"');
}
function strip(s) {
  return s.replace(/<[^>]+>/g,' ').replace(/&gt;/g,'>>').replace(/&lt;/g,'<')
          .replace(/&amp;/g,'&').replace(/&#039;/g,"'").replace(/&quot;/g,'"').trim();
}
function esc(s)     { var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function mk(t,c)    { var e=document.createElement(t); if(c) e.className=c; return e; }
function setSt(h)   { $st.innerHTML=h; }
function fmtSize(b) { return b<1024?b+'B':b<1048576?(b/1024).toFixed(1)+'KB':(b/1048576).toFixed(1)+'MB'; }
function ls(k)      { try{return localStorage.getItem(k);}catch(e){return null;} }
function lsSave(k,v){ try{localStorage.setItem(k,v);}catch(e){} }

// ── Boot ──────────────────────────────────
loadBoards();
</script>
